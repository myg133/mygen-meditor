<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>mygen-meditor Test</title>
  <style>
    html, body {
      margin: 0;
      height: 100vh;
      width: 100vw;
      padding: 0;
      box-sizing: border-box;
      overflow: hidden;
    }
    #app {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { MermaidEditor } from './src/index.ts';
    const editor = new MermaidEditor({
      container: document.getElementById('app'),
      initialCode: 'graph TD\n  A[Start] --> B{Is it working?}\n  B -->|Yes| C[Great!]\n  B -->|No| D[Debug]',
    });
    editor.init();
  </script>
</body>
</html>
